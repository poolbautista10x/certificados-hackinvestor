<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados HackInvestor Academy</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
    padding:20px;
}

input{
    width:300px;
    padding:12px;
    font-size:18px;
    margin:10px;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.generar{
    background:#0057ff;
    color:white;
}

.descargar{
    background:#0a7c2f;
    color:white;
}

#certificado{
    position:relative;
    width:1200px;
    margin:20px auto;
}

#certificado img{
    width:100%;
    display:block;
}

#nombre{
    position:absolute;
    top:49%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:58px;
    font-family:cursive;
    color:#1a1a1a;
}
</style>
</head>
<body>

<h2>HackInvestor Academy</h2>

<input type="text" id="nombreInput" placeholder="Escribe tu nombre">

<br>

<button class="generar" onclick="generarCertificado()">
Generar Certificado
</button>

<button class="descargar" onclick="descargarCertificado()">
Descargar Certificado
</button>

<div id="certificado">
    <img src="certificado.png" alt="Certificado">
    <div id="nombre"></div>
</div>

<script>

function generarCertificado(){
    let nombre = document.getElementById("nombreInput").value;
    document.getElementById("nombre").innerText = nombre;
}

function descargarCertificado(){

html2canvas(document.querySelector("#certificado"),{
scale:2
}).then(canvas => {

let link = document.createElement("a");
link.download = "certificado.png";
link.href = canvas.toDataURL("image/png");
link.click();

});

}

</script>

</body>
</html>
