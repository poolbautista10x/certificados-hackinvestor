<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados HackInvestor</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.15);
width:400px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#0057ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">
<h2>HackInvestor Academy</h2>
<p>Ingresa tu nombre para generar tu certificado</p>

<input type="text" id="nombre" placeholder="Nombre completo">

<button onclick="generarCertificado()">
Generar Certificado
</button>
</div>

<script>
function generarCertificado(){

let nombre = document.getElementById("nombre").value;

if(nombre===""){
alert("Ingresa tu nombre");
return;
}

let nuevaVentana = window.open("");

nuevaVentana.document.write(`
<html>
<body style="margin:0;">

<div style="position:relative;width:1400px;">

<img src="certificado.jpg" style="width:1400px;">

<div style="
position:absolute;
top:520px;
left:0;
width:1400px;
text-align:center;
font-size:60px;
font-family:cursive;
color:#001b44;
">
${nombre}
</div>

</div>

<script>
window.onload=function(){
window.print();
}
<\/script>

</body>
</html>
`);
}
</script>

</body>
</html>
